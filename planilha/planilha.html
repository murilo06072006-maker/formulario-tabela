<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabela de Alunos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px;
      background-color: #f4f4f4;
    }

    table {
      border-collapse: collapse;
      width: 600px;
      background-color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    th, td {
      border: 1px solid #ccc;
      padding: 12px 16px;
      text-align: center;
    }

    thead {
      background-color: #2c3e50;
      color: #fff;
    }

    tbody tr:nth-child(even) {
      background-color: #ecf0f1;
    }

    tfoot {
      background-color: #2c3e50;
      color: #fff;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <table>

    <!-- THEAD: cabeçalho da tabela -->
    <thead>
      <tr>
        <th colspan="4">📋 Tabela de Notas — Turma HTML</th>
      </tr>
      <tr>
        <th>Aluno</th>
        <th>Prova 1</th>
        <th>Prova 2</th>
        <th>Média</th>
      </tr>
    </thead>

    <!-- TBODY: corpo da tabela com rowspan e colspan -->
    <tbody>
      <tr>
        <td rowspan="2">Murilo</td>
        <td>8.5</td>
        <td>9.0</td>
        <td>8.75</td>
      </tr>
      <tr>
        <!-- rowspan acima ocupa esta célula de "Aluno" -->
        <td>7.0</td>
        <td>8.0</td>
        <td>7.50</td>
      </tr>
      <tr>
        <td>Ana</td>
        <td>9.5</td>
        <td>10.0</td>
        <td>9.75</td>
      </tr>
      <tr>
        <td>Carlos</td>
        <td>6.0</td>
        <td>7.5</td>
        <td>6.75</td>
      </tr>
    </tbody>

    <!-- TFOOT: rodapé com colspan para ocupar colunas -->
    <tfoot>
      <tr>
        <td colspan="3">Média Geral da Turma</td>
        <td>8.19</td>
      </tr>
    </tfoot>

  </table>

</body>
</html>
